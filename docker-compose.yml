services:
  mysql:
    image: mysql:8.4
    container_name: quiz-service-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: quiz_db
    ports:
      - "3306:3306"
    volumes:
      - quiz_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  quiz_mysql_data:
